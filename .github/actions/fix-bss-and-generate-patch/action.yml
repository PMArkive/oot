inputs:
  version:
    required: true

runs:
  using: composite
  steps:
    - name: Fix BSS
      run: .venv/bin/python3 tools/fix_bss.py -v ${{ inputs.version }}

    - name: Generate patch
      run: git diff > ${{ inputs.version }}.patch

    - name: Upload patch
      uses: actions/upload-artifact@v7
      with:
        name: fix-bss/${{ inputs.version }}.patch
        path: ${{ inputs.version }}.patch
